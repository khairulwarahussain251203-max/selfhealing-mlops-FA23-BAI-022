apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-green-deployment
  labels:
    app: sentiment-api
    slot: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: green
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: green
    spec:
      containers:
        - name: sentiment-api
          image: khairulwara25/sentiment-api:stable
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
